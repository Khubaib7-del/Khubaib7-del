name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Full Infographic Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICES_TOKEN }}
          user: khubaib7-del
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Karachi
          config_theme: dark
          filename: metrics.svg
          
          # Isometric Calendar (3D Contribution Grid)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Coding Habits
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Languages
          plugin_languages: yes
          plugin_languages_ignored: html, css, jupyter notebook, tex, makefile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used, recently-used
          plugin_languages_limit: 8

          # Achievements
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C

          # Follow-up (Issues/PRs activity)
          plugin_followup: yes
          plugin_followup_sections: repositories, user
