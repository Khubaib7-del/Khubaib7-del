name: Metrics
on:
  # Schedule daily updates at midnight
  schedule: [{cron: "0 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # ==========================================
      # 1. Main Metrics Card (Classic & Dark)
      # ==========================================
      - name: Main Profile Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.classic.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: khubaib7-del
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Karachi
          config_theme: dark
          
          # Isometric Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Languages Used
          plugin_languages: yes
          plugin_languages_ignored: html, css, jupyter notebook, tex, makefile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # Habits / Recent Activity Facts
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

      # ==========================================
      # 2. Detailed Achievements Card
      # ==========================================
      - name: Achievements Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: khubaib7-del
          template: classic
          base: ""
          config_theme: dark
          
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C

      # ==========================================
      # 3. 3D City Skyline (Contributions Grid)
      # ==========================================
      - name: GitHub City Skyline
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.skyline.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: khubaib7-del
          template: classic
          base: ""
          config_theme: dark

          plugin_skyline: yes
          plugin_skyline_year: current
          plugin_skyline_frames: 60
          plugin_skyline_quality: 1

      # ==========================================
      # 4. LeetCode / Coding Stats (Optional, if you have LeetCode)
      # ==========================================
      # You can uncomment this if you have a Leetcode account with the same username!
      # - name: LeetCode Metrics
      #   uses: lowlighter/metrics@latest
      #   with:
      #     filename: metrics.leetcode.svg
      #     token: ${{ secrets.METRICS_TOKEN }}
      #     user: khubaib7-del
      #     base: ""
      #     config_theme: dark
      #     plugin_leetcode: yes
      #     plugin_leetcode_user: khubaib7-del
      #     plugin_leetcode_sections: solved, skills, recent
